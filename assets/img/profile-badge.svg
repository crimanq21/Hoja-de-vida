  <text x="200" y="178" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff">CD</text>
  <text x="200" y="276" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Cristian Delgado</text>
