<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Insignia profesional Cristian Delgado</title>
  <desc id="desc">Emblema visual con iniciales CD sobre composición moderna.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
